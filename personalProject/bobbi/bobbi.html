<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
}
.container {
    position: relative;
    width: 100%;
}

.container img {
	width: 100%;
	height:auto;
    display: block;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>

</head>

<body>

<div class="container"> 
    <img src="./pt/bobbi_1.jpg" alt="" >
    <svg class="overlay"
         viewBox="0 0 1920 6610"
         preserveAspectRatio="none">
         
        <a href="./bobbiWeb.jsp">
            <rect  x="0" y="0" width="1920" height="204"
                  fill="transparent"/>
        </a>
	</svg> 
	
	<img src="./pt/bobbi_2.jpg" alt="" >
	<img src="./pt/bobbi_3.jpg" alt="" >
	<img src="./pt/bobbi_4.jpg" alt="" >
</div>

</body>
</html>
